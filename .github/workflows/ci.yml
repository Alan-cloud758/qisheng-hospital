name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: qisheng_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - name: Backend tests
        env:
          DATABASE_URL: mysql://root:testroot@localhost:3306/qisheng_test
          AUTH_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test
        run: npm run backend:test
      - name: Frontend tests
        run: npm run frontend:test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run build
