services:
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-qisheng_root}
      MYSQL_DATABASE: qisheng_hospital
      MYSQL_USER: qisheng
      MYSQL_PASSWORD: ${DB_PASSWORD:-qisheng_pass}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-real-secret-at-least-32-chars}
      DATABASE_URL: mysql://qisheng:${DB_PASSWORD:-qisheng_pass}@mariadb:3306/qisheng_hospital
      CORS_ORIGIN: http://localhost:8080
      REDIS_ENABLED: "false"
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
